spring.datasource.url=jdbc:h2:mem:ecommerce-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=false

spring.sql.init.mode=never

spring.app.jwtSecret=test-secret-for-context-loads-only
spring.app.jwtExpirationMs=3600000

spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=test@example.com
spring.mail.password=test

minio.url=http://localhost:9000
minio.accessKey=test-access-key
minio.secretKey=test-secret-key
minio.bucket=test-bucket

aws.bucket.name=test-bucket
cloud.aws.credentials.access-key=test-access-key
cloud.aws.credentails.secret-key=test-secret-key
cloud.aws.region.static=us-east-1
